-- Configuration settings: https://conky.cc/config_settings
conky.config = {
    -- alignment = 'middle_middle',
    alignment = 'center',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = '#dddddd',
    default_outline_color = '#dddddd',
    default_shade_color = '#dddddd',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Source Code Pro:size=8',
    gap_x = 0,
    gap_y = 0,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

-- Variables: https://conky.cc/variables
conky.text = [[
$color${time %a, %b %d%n%T}
$hr
${color #888888}Uptime:$color     $uptime
${color #888888}Frequency:$color  ${freq_g}GHz
${color #888888}Load Avg:$color   $loadavg
${color #888888}CPU Usage:$color  $cpu% ${alignr}${cpubar 6,110}
${color #888888}RAM Usage:$color  $mem  ${alignr}${membar 6,110}
${color #888888}Swap Usage:$color $swap ${alignr}${swapbar 6,110}
$hr
${color #888888}File systems:
${color #888888} / $color${fs_used /}/${fs_size /} ${alignr}${fs_bar 6,110 /}
${color #888888}Networking:
${color #888888} Wifi:$color ${if_up wlp3s0}up${else}down${endif}
${color #888888} Up:$color   ${upspeed}${color #888888} - Down:$color ${downspeed}
$hr
${color #888888}Battery:$color ${battery_percent BAT0}% ${alignr}${battery_bar 6,110 BAT0}
${color #888888}Volume:$color  ${pa_sink_volume}% ${alignr}${pa_sink_volumebar 6,110}
$hr
${color #888888}Processes:$color  $processes  ${color #888888}Running:$color $running_processes
${color #888888}Name                 PID   CPU%   MEM%
${color #dddddd}${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${color #dddddd}${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${color #dddddd}${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${color #dddddd}${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
${color #dddddd}${top name 5} ${top pid 5} ${top cpu 5} ${top mem 5}
${color #dddddd}${top name 6} ${top pid 6} ${top cpu 6} ${top mem 6}
${color #dddddd}${top name 7} ${top pid 7} ${top cpu 7} ${top mem 7}
${color #dddddd}${top name 8} ${top pid 8} ${top cpu 8} ${top mem 8}
]]
